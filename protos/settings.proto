syntax = "proto3";

package d2bot;

option csharp_namespace = "D2BotNG.Core.Protos";

import "google/protobuf/empty.proto";
import "profiles.proto";

// Settings service - Update returns Empty, new value arrives via events
service SettingsService {
  rpc Update(Settings) returns (google.protobuf.Empty);
  rpc TestDiscord(DiscordSettings) returns (TestDiscordResponse);
}

message TestDiscordResponse {
  bool success = 1;
  string message = 2;  // Success message or error details
}

// File browser service (for remote D2 path selection)
service FileService {
  rpc ListDirectory(ListDirectoryRequest) returns (DirectoryListing);
}

// Action when user clicks close button
enum CloseAction {
  CLOSE_ACTION_ASK = 0;            // Show prompt asking what to do
  CLOSE_ACTION_MINIMIZE_TO_TRAY = 1; // Always minimize to tray
  CLOSE_ACTION_EXIT = 2;           // Always exit the application
}

// Available font options for item rendering
enum ItemFont {
  ITEM_FONT_EXOCET = 0;      // Exocet (Diablo II title font)
  ITEM_FONT_CONSOLAS = 1;    // Consolas (monospace)
  ITEM_FONT_SYSTEM = 2;      // System default
}

message Settings {
  bool start_minimized = 1;
  ServerSettings server = 2;
  DiscordSettings discord = 3;
  CloseAction close_action = 4;
  DisplaySettings display = 5;
  LegacyApiSettings legacy_api = 6;
  GameSettings game = 7;
  string base_path = 8; // Application base directory. Settings/profiles etc., will be created in data/ subdirectory. Expects to have a d2bs directory and d2bs.ini file inside.
  WindowSettings window = 9;
  optional bool minimize_to_tray = 10; // When the minimize button or system minimize is invoked, hide to tray instead of the taskbar. Optional so absence can default to true.
  StartupSettings startup = 11;
  EngineSettings engine = 12;
}

// Controls how profile starts are paced. Each profile waits its turn (limited by
// concurrency), waits delay_ms (with a per-second status countdown when >= 1s),
// then launches. Used to avoid hammering Battle.net with simultaneous logins.
message StartupSettings {
  int32 concurrency = 1;  // Max profiles allowed to be starting at the same time. 0 = no limit.
  int32 delay_ms = 2;     // Milliseconds to wait before launching each profile (after its turn). 0 = no wait.
}

// Profile health monitoring and crash recovery thresholds. Each value falls back
// to a built-in default when <= 0 (heartbeat timeout 30s, 3 missed heartbeats,
// 5 crash retries, 30s unresponsive timeout), so leaving them unset preserves the original behavior.
message EngineSettings {
  int32 heartbeat_timeout_seconds = 1; // Seconds without a heartbeat before a miss is counted. <= 0 uses the default (30).
  int32 max_missed_heartbeats = 2;     // Consecutive missed heartbeats before the bot is killed and restarted. <= 0 uses the default (3).
  int32 max_crash_retries = 3;         // Restart attempts after a crash before giving up (and disabling the schedule). <= 0 uses the default (5).
  int32 unresponsive_timeout_seconds = 4; // Kill + restart a game whose window is continuously unresponsive (OS "not responding") this long, even if heartbeats still arrive. <= 0 uses the default (30).
}

message WindowSettings {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
  bool is_maximized = 5;
}

message GameSettings {
  string d2_install_path = 1;  // Diablo II installation path (defaults to registry or desktop)
  string game_version = 2;     // D2 version for patch selection (e.g., "1.14d", "1.13c"). Defaults to "1.14d".
  int32 screenshot_retention_days = 3; // Auto-delete Screenshot*.jpg in the install root older than N days. 0 = disabled.
  int32 crash_log_retention_days = 4;  // Auto-delete BlizzardError subdirectories older than N days. 0 = disabled.
}

message DisplaySettings {
  ItemFont item_font = 1;
  bool show_item_header = 2;  // Show profile info header on item images
}

message ServerSettings {
  string host = 1;
  uint32 port = 2;
  optional string password = 3;
}

message DiscordSettings {
  bool enabled = 1;
  string token = 2;
  string server_id = 3;
  optional string password = 4;

  // Global webhooks fired for every profile's messages, in addition to any
  // per-profile webhooks configured on the Profile itself. The username posted
  // to Discord is the profile name, so messages from different profiles remain
  // distinguishable in a shared channel.
  repeated DiscordWebhook webhooks = 5;
}

message LegacyApiSettings {
  bool enabled = 1;
  repeated string profiles = 2;
  repeated LegacyApiUser users = 3;
}

enum LegacyApiPermissions {
  LEGACY_API_PERMISSIONS_UNDEFINED = 0; // Used as a default value if deserialization fails.
  LEGACY_API_PERMISSIONS_PUBLIC = 1;
  LEGACY_API_PERMISSIONS_ADMIN = 2;
}

message LegacyApiUser {
  string name = 1;
  string api_key = 2;
  LegacyApiPermissions permissions = 3;
}

message ListDirectoryRequest {
  string path = 1;
}

message DirectoryListing {
  string current_path = 1;
  repeated DirectoryEntry entries = 2;
}

message DirectoryEntry {
  string name = 1;
  bool is_directory = 2;
}
