syntax = "proto3";

package d2bot;

import "google/protobuf/empty.proto";

option csharp_namespace = "D2BotNG.Core.Protos";

// Item and entity service
service ItemService {
  // List available entities (characters/directories) for tree browser
  rpc ListEntities(ListEntitiesRequest) returns (ListEntitiesResponse);

  // Search items within selected entity path
  rpc Search(SearchItemsRequest) returns (SearchItemsResponse);

  // Remove a single item line from a mule .txt file on disk
  rpc RemoveItem(RemoveItemRequest) returns (google.protobuf.Empty);
}

message ListEntitiesRequest {
  string path_prefix = 1;  // Optional: filter to subdirectory (e.g., "USWest/MyAccount")
}

// Game mode flags parsed from filename suffix (.sel, .hcl, etc)
message EntityMode {
  bool hardcore = 1;   // h vs s
  bool expansion = 2;  // e vs c
  bool ladder = 3;     // l vs n
}

message Entity {
  string path = 1;          // Relative path: "USWest/MyAccount/Sorc.sel"
  string display_name = 2;  // Display name: "Sorc"
  bool is_leaf = 3;         // true = character file, false = directory
  EntityMode mode = 4;      // Only set for leaf entities (parsed from suffix)
}

message ListEntitiesResponse {
  repeated Entity entities = 1;
}

// Optional filters for game mode
message ModeFilter {
  optional bool hardcore = 1;
  optional bool expansion = 2;
  optional bool ladder = 3;
}

message SearchItemsRequest {
  string entity_path = 1;      // Path to search in (empty = root/all)
  string query = 2;            // Search query (regex on name/description)
  ModeFilter mode_filter = 3;  // Optional game mode filter
  int32 offset = 4;            // Pagination offset (default 0)
  int32 limit = 5;             // Pagination limit (0 = no limit)
}

message SearchItemsResponse {
  repeated SearchResultItem results = 1;
  int32 total = 2;             // Total matching items (for pagination UI)
}

// One entry of a search response — the item plus its source-file context.
message SearchResultItem {
  Item item = 1;
  string entity_path = 2;  // Mule file path (relative under mules dir, no .txt extension)
}

message Item {
  string header = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  int32 item_color = 5;
  int32 text_color = 6;
  repeated Item sockets = 7;

  // Character-viewer fields (zero/unset for mule-file items)
  int32 location = 8;    // game storage/location code
  int32 x = 9;           // grid column; equip-location id for slot containers (equipped/merc)
  int32 y = 10;          // grid row (0 for slot containers)
  int32 width = 11;      // size in cells
  int32 height = 12;     // size in cells
  bool ethereal = 13;    // explicit (mule items still infer from description)
  int32 quality = 14;    // optional quality enum
  uint32 gid = 15;       // game-session unit id
  int32 inv_trans = 16;  // base item's InvTrans palette group; 0/3/4/>=9 = no inventory tint
}

message RemoveItemRequest {
  string entity_path = 1;     // e.g. "EU (AMS)/Kolbot-SoloPlay/Anna#27334/sorceress--SCL-SOR-002AN-Anna.scnl"
  string description_id = 2;  // The post-$ identifier from the item description, e.g. "1813426114:605:3:9:0"
}
